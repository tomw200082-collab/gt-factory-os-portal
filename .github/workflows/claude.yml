# GT Factory OS Portal — @claude mention handler.
#
# Required repo secret:
#   ANTHROPIC_API_KEY   (from console.anthropic.com → Settings → API Keys → Create Key)
#
# Branch protection recommendation:
#   Require status check `portal-pr-guard / ci` to pass before merging.
#   Require 1 reviewer approval on `tranche-fix` PRs.
#
# Triggered by:
#   - @claude mentions in issue comments and PR review comments
#   - @claude mentions in issue bodies and PR bodies

name: claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The action loads the repo's .claude/ config automatically.
          # Custom commands in .claude/commands/ are available as /portal-*.
          # Subagents in .claude/agents/ are dispatchable.
