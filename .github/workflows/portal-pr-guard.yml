# GT Factory OS Portal — PR guard
#
# Runs on every PR against main. Required check for merge.
#
# Checks: typecheck + registry presence + Vitest (quarantine-gated).
#
# Vitest now gates every PR. It runs the full unit/component suite EXCEPT the
# files listed in docs/portal-os/vitest-quarantine.txt — currently the 11
# pre-existing drifted suites triaged in tranche 032. Everything else (298+
# tests across 41 files at time of writing) must stay green. As each
# quarantined suite is fixed in its own tranche, its line is removed and it
# rejoins the gate. Playwright e2e remains opt-in (separate runner / live DB).

name: portal-pr-guard

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Vitest (quarantine-gated)
        run: |
          set -euo pipefail
          QUARANTINE=docs/portal-os/vitest-quarantine.txt
          EXCLUDES=()
          if [ -f "$QUARANTINE" ]; then
            while IFS= read -r line; do
              # strip comments / blank lines
              case "$line" in
                ''|\#*) continue;;
              esac
              EXCLUDES+=(--exclude "$line")
            done < "$QUARANTINE"
          fi
          echo "Excluding ${#EXCLUDES[@]} quarantined glob(s) from the Vitest gate."
          npx vitest run "${EXCLUDES[@]}"

      - name: Registry presence check for new portal-os artifacts
        run: |
          set -euo pipefail
          git fetch origin main
          NEW_FILES=$(git diff --name-only --diff-filter=A origin/main...HEAD | grep '^docs/portal-os/' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "no new portal-os artifacts"
            exit 0
          fi
          MISSING=0
          for f in $NEW_FILES; do
            # skip the registry itself and generated subtree dirs
            case "$f" in
              docs/portal-os/registry.md) continue;;
              docs/portal-os/audit-reports/*|docs/portal-os/drift-reports/*|docs/portal-os/readiness/*) continue;;
            esac
            if ! grep -Fq "$f" docs/portal-os/registry.md; then
              echo "::error file=docs/portal-os/registry.md::new artifact $f is missing from docs/portal-os/registry.md"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Drift scan (only if label 'drift-scan' present)
        if: contains(github.event.pull_request.labels.*.name, 'drift-scan')
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: '/portal-regression-guard'
