# GT Factory OS Portal — PR guard
#
# Runs on every PR against main. Required check for merge.
#
# Checks: lint + typecheck + vitest + registry presence.
# vitest was enabled in tranche 035 once the unit suite was driven fully green
# (366 passing, 5 documented skips) — gating it stops the silent test-rot that
# had let 35 assertions drift. lint was enabled 2026-06-12 once the codebase
# was driven to 0 errors (eslint flat config; max-warnings guards against
# error-level regressions only — warn-level ratchet rules don't block).

name: portal-pr-guard

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The Playwright webServer (next dev) inherits this so the dev-shim auth
      # path is active for the @mocked e2e (no Supabase backend needed).
      NEXT_PUBLIC_ENABLE_DEV_SHIM_AUTH: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E — mocked focus flow (no backend)
        # Runs only @mocked specs (browser-stubbed API), so it never depends on
        # a live Supabase backend. Tranche 036.
        run: npx playwright test --grep @mocked

      - name: Registry presence check for new portal-os artifacts
        run: |
          set -euo pipefail
          git fetch origin main
          NEW_FILES=$(git diff --name-only --diff-filter=A origin/main...HEAD | grep '^docs/portal-os/' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "no new portal-os artifacts"
            exit 0
          fi
          MISSING=0
          for f in $NEW_FILES; do
            # skip the registry itself and generated subtree dirs
            case "$f" in
              docs/portal-os/registry.md) continue;;
              docs/portal-os/audit-reports/*|docs/portal-os/drift-reports/*|docs/portal-os/readiness/*) continue;;
            esac
            if ! grep -Fq "$f" docs/portal-os/registry.md; then
              echo "::error file=docs/portal-os/registry.md::new artifact $f is missing from docs/portal-os/registry.md"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Drift scan (only if label 'drift-scan' present)
        if: contains(github.event.pull_request.labels.*.name, 'drift-scan')
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: '/portal-regression-guard'
